name: Sync Core Files

on:
  push:
    branches:
      - main
    paths:
      - 'core/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Bettbox
        uses: actions/checkout@v4
        with:
          repository: Filterrr/Bettbox
          ref: main
          path: bettbox

      - name: Checkout FlClash
        uses: actions/checkout@v4
        with:
          repository: Filterrr/FlClash
          ref: rollback-375c4e0
          path: flclash
          token: ${{ secrets.SYNC_PAT }}

      - name: Sync files
        run: |
          rsync -av --delete bettbox/core/ flclash/core/

      - name: Commit and Push
        run: |
          cd flclash
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add core/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync core files from Bettbox"
            git push
          fi
