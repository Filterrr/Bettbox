name: Release Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  
jobs:
  build-android:
    name: Build Android APKs (Unsigned)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-android-universal-${{ hashFiles('**/pubspec.lock') }}

      - name: Install Dependencies
        run: |
          flutter pub get
          dart run build_runner build -d

      - name: Build Release APK
        run: |
          dart setup.dart android --arch universal --out core ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --split-per-abi \
            --dart-define=APP_ENV=prod \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN || 'dummy' }}
            
      - name: Rename APKs with timestamp
        id: apk
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          for file in build/app/outputs/flutter-apk/*-release.apk; do
            new_name="bettbox-android-${TIMESTAMP}-$(basename "$file")"
            mv "$file" "$new_name"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bettbox-android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 1
          overwrite: true

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-2022
            arch: amd64
          - platform: windows
            os: windows-2022
            arch: arm64
          - platform: macos
            os: macos-15
            arch: arm64
          - platform: macos
            os: macos-15
            arch: amd64
          - platform: linux
            os: ubuntu-24.04
            arch: amd64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
          - platform: windows
            os: windows-2022
            arch: amd64
            compatible: true
          - platform: macos
            os: macos-15
            arch: amd64
            compatible: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Rust
        if: matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || 'x86_64-pc-windows-msvc' }}

      - name: Install Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev ninja-build libgtk-3-dev rpm

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.compatible == true && '1.22.x' || '1.25.x' }}
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.os == 'ubuntu-24.04-arm' && 'master' || 'stable' }}
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: ${{ matrix.os == 'ubuntu-24.04-arm' && '' || '3.38.10' }}

      - name: Build Bettbox
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }} ${{ matrix.compatible == true && '--compatible' || '' }}
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bettbox-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.compatible == true && '-compatible' || '' }}
          path: ./dist
          compression-level: 9
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build, build-android ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: Bettbox-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          echo "- Fixes and improvements" > release.md

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          mihomo_version=$(grep -oP 'Version\s*=\s*"\K[^"]+' core/Clash.Meta/constant/version.go)
          sed "s|VERSION|$version|g; s|MIHOMO_VERSION|$mihomo_version|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done  

      - name: Release
        if: ${{ env.IS_STABLE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'
