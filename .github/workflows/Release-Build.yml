name: Enterprise Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
      - ".gitignore"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:

  build:

    name: ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:

# ---------------- ANDROID ----------------

          - platform: android
            arch: universal
            os: ubuntu-24.04
            android: true
            go: stable
            flutter: stable

# ---------------- WINDOWS ----------------

          - platform: windows
            arch: amd64
            os: windows-2022
            go: 1.25.x
            flutter: stable
            flutter_version: 3.38.10

          - platform: windows
            arch: arm64
            os: windows-2022
            go: 1.25.x
            flutter: stable
            flutter_version: 3.38.10

# ---------------- MACOS ----------------

          - platform: macos
            arch: arm64
            os: macos-15
            go: 1.25.x
            flutter: stable
            flutter_version: 3.38.10

          - platform: macos
            arch: amd64
            os: macos-15
            go: 1.25.x
            flutter: stable
            flutter_version: 3.38.10

# ---------------- LINUX ----------------

          - platform: linux
            arch: amd64
            os: ubuntu-24.04
            go: 1.25.x
            flutter: stable
            flutter_version: 3.38.10

          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            go: 1.25.x
            flutter: master

# =================================================
# CI Steps
# =================================================

    steps:

# ---------------- Checkout ----------------

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

# ---------------- Android Java ----------------

      - name: Setup Java
        if: matrix.android == true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

# ---------------- Windows Rust ----------------

      - name: Setup Rust
        if: matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || 'x86_64-pc-windows-msvc' }}

# ---------------- Linux Dependencies ----------------

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libcurl4-openssl-dev \
            rpm

# ---------------- Go ----------------

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: core/go.sum

# ---------------- Flutter ----------------

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter }}
          flutter-version: ${{ matrix.flutter_version || '' }}
          cache: true

# ---------------- Dependencies ----------------

      - name: Install Dependencies
        run: |
          flutter pub get
          dart run build_runner build -d

# =================================================
# Android Build
# =================================================

      - name: Build Android APK
        if: matrix.android == true
        run: |

          dart setup.dart android \
          --arch universal \
          --out core \
          ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

          flutter build apk \
          --release \
          --split-per-abi \
          --target-platform android-arm,android-arm64,android-x64 \
          --dart-define=APP_ENV=prod \
          --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN || 'dummy' }}

# =================================================
# Desktop Build
# =================================================

      - name: Build Desktop
        if: matrix.android != true
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |

          dart setup.dart \
          ${{ matrix.platform }} \
          --arch ${{ matrix.arch }} \
          ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

# =================================================
# Windows Portable Package
# =================================================

      - name: Build Windows Portable
        if: matrix.platform == 'windows'
        run: |

          mkdir portable
          xcopy dist portable\ /E /I /Y

          powershell Compress-Archive `
          portable\* `
          Bettbox-${{ matrix.arch }}-portable.zip

# =================================================
# Artifact Upload
# =================================================

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4

        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}

          path: |
            ${{ matrix.android == true && 'build/app/outputs/flutter-apk/*.apk' || 'dist' }}
            Bettbox-${{ matrix.arch }}-portable.zip

          compression-level: 9
          retention-days: 7
          overwrite: true
