name: Update Dependencies

on:
  # 允许手动触发
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    
    # 必须开启写权限，否则无法将更新后的 lock 文件推送到仓库
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 必须使用 fetch-depth: 0 以确保能正常 push
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      # 2. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. 运行更新命令
      - name: Upgrade dependencies
        run: flutter pub upgrade --major-versions

      # 4. 检查是否有文件更改
      - name: Check for changes
        id: git-check
        run: |
          # 同时检查 yaml 和 lock 文件
          git diff --exit-code pubspec.yaml pubspec.lock || echo "changed=true" >> $GITHUB_OUTPUT

      # 5. 提交并推送更改
      - name: Commit and Push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml pubspec.lock  # <--- 必须同时添加这两个文件
          git commit -m "chore: upgrade dependencies to latest major versions"
          git push
