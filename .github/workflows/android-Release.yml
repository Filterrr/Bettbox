name: Android Release Production

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'apk'
        type: choice
        options: [apk, appbundle]
  push:
    tags: [ 'v*' ] # 只有打标签时才执行完整发布流程

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用并发限制，防止同一个分支多次 Push 浪费资源
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
      
      # 1. 深度环境初始化
      - name: Initialize Specialized Tools
        uses: ./.github/actions/setup-tools # 建议将复杂的 setup 逻辑封装到本地 Action
        continue-on-error: false

      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # 固定大版本防止环境漂移
          cache: true

      # 2. 增强型缓存策略
      - name: Restore Multi-Level Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
            core/target # 如果 Go/Rust 编译产物在此
          key: ${{ runner.os }}-build-${{ hashFiles('**/pubspec.lock', 'core/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-build-

      # 3. 自动化签名准备
      - name: Prepare Signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      # 4. 执行构建 (带混淆与符号表分离)
      - name: Production Build
        run: |
          # 注入签名环境变量供 Gradle 读取
          export KEY_STORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
          export KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
          export ALIAS='${{ secrets.KEY_ALIAS }}'
          
          flutter build ${{ github.event.inputs.build_type || 'apk' }} --release \
            --obfuscate --split-debug-info=build/symbols \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --build-number=${{ github.run_number }}

      # 5. 产物精简上传
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
            build/symbols/ # 务必保留，用于 Sentry 解析
          retention-days: 5
