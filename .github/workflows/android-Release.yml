name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  debug-build:
    name: Build Flutter Android
    runs-on: ubuntu-latest
    timeout-minutes: 30 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
        with:
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' 

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:" 

      - name: Install Dependencies
        run: |
          flutter pub get
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build -d
          fi

      - name: Build Release APK
        run: |
          dart setup.dart android --arch universal --out core
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64,android-universal \
            --split-per-abi \
            --dart-define=APP_ENV=prod \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN || 'dummy' }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: bettbox-release-${{ github.ref_name }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 1
          if-no-files-found: error
