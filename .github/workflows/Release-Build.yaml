name: Release Build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ubuntu-latest                # 全部统一为 Linux 运行器
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Android 平台 ---
          - platform: android
            arch: universal
            is_android: true
            go_version: '1.25.x'
            flutter_channel: 'stable'

          # --- Windows 平台（交叉编译）---
          - platform: windows
            arch: amd64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'
          - platform: windows
            arch: arm64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'
          - platform: windows
            arch: amd64
            compatible: true
            go_version: '1.22.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'

          # --- macOS 平台（交叉编译）---
          - platform: macos
            arch: arm64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'
          - platform: macos
            arch: amd64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'
          - platform: macos
            arch: amd64
            compatible: true
            go_version: '1.22.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      # Android 特有：配置 Java 环境
      - name: Setup Java 17
        if: matrix.is_android == true
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      # 原 Windows 特有的 Rust 配置：如需交叉编译目标，可改为安装对应 target
      # 此处保留条件安装，但改为安装 Linux 上的交叉编译 Rust target
      - name: Setup Rust (cross‑compile)
        if: matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || 'x86_64-pc-windows-msvc' }}

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version }}
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter_channel }}
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: ${{ matrix.flutter_version || '' }}

      - name: Prepare Dependencies
        run: |
          flutter pub get
          dart run build_runner build -d

      # --- 核心构建逻辑 ---

      # Android 构建
      - name: Build Android APK
        if: matrix.is_android == true
        run: |
          dart setup.dart android --arch universal --out core ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --split-per-abi \
            --dart-define=APP_ENV=prod \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN || 'dummy' }}

      # Android 签名
      - name: Sign Android APKs with Fixed Keystore
        if: matrix.is_android == true
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | grep -v "\.bat$" | sort -r | head -n 1)
          for apk in build/app/outputs/flutter-apk/*-release.apk; do
            if [ -f "$apk" ]; then
              echo "Applying consistent signature to $apk"
              $APKSIGNER sign --ks release.keystore \
                --ks-pass env:KEYSTORE_PASSWORD \
                --ks-key-alias "$KEY_ALIAS" \
                --key-pass env:KEY_PASSWORD \
                "$apk"
            fi
          done
          rm release.keystore

      # 桌面端构建（现在全在 Linux 上交叉编译）
      - name: Build Desktop Platform
        if: matrix.is_android != true
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          dart setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }} ${{ matrix.compatible == true && '--compatible' || '' }}

      # --- 产物上传（路径保持不变）---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Bettbox-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.compatible == true && '-compatible' || '' }}
          path: ${{ matrix.is_android == true && 'build/app/outputs/flutter-apk/*.apk' || './dist' }}
          compression-level: 9
          retention-days: 3
          overwrite: true
